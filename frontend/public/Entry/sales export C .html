<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Export Sales Creation</title>
<link rel="stylesheet" href="export-sales C.css">
</head>
<body>

<!-- TOP FRAME -->
<div class="top-bar">
</div>





<div class="screen-title">Export Sales Creation</div>

<!-- MIDDLE FRAME -->
<div class="middle-frame">

  <div class="form-area">

    <!-- LEFT COLUMN -->
    <div class="col">
      <label>Bill No</label><input value="">
      <label>Date</label><input value="">
      <label>Order No/Dt</label><input>
      <label>Dis Port</label><input>
      <label>Dest Country</label><input>
      <label>Final Destin</label><input>
      <label>Sender</label><input>
      <label>Net Wt</label><input>
      <label>Advance</label><input>
    </div>

    <!-- CENTER COLUMN -->
    <div class="col">
      <label>Exporter</label><input>
      <label>Consignee</label><input>
      <label>Buyer (Other)</label><input>
      <label>Other Ref</label><input>
      <label>Pre Carriage</label><input>
      <label>Vessel / Flt No</label><input>
      <label>Consigned To</label><input>
      <label>Gross Wt</label><input>
      <label>Sign</label><input>
    </div>

    <!-- RIGHT COLUMN -->
    <div class="col">
      <label>Place Of Rcpt</label><input>
      <label>Loading Port</label><input>
      <label>Origin Country</label><input>
      <label>Delivery Terms</label><input>
      <label>Payment Terms</label><input>
      <label>Pur. Transport</label><input>
      <label>Driver</label><input>
      <label>Lorry No</label><input>
      <label>Remarks</label><input>
    </div>

  </div>

  <!-- ITEM GRID -->
  <table class="grid">
    <thead>
      <tr>
        <th>Container No</th>
        <th>Kind of Package</th>
        <th>Description</th>
        <th>Qty in kg</th>
        <th>MFD / Exp Dt</th>
        <th>Lot No</th>
        <th>Qty</th>
        <th>USD Rate</th>
        <th>Conv Rate</th>
        <th>USD Amt</th>
        <th>INR Amt</th>
      </tr>
    </thead>
    <tbody>
      <tr><td colspan="11">&nbsp;</td></tr>
      <tr><td colspan="11">&nbsp;</td></tr>
      <tr><td colspan="11">&nbsp;</td></tr>
      <tr><td colspan="11">&nbsp;</td></tr>
    </tbody>
  </table>

</div>

<!-- BOTTOM FRAME -->
<div class="bottom-bar">
  <div class="total">0.00</div>
  <button>Save</button>
</div>

</body>
</html>
