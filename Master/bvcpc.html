<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Item Creation</title>
    <link rel="stylesheet" href="style5.css">
</head>
<body>

<div class="container">
    <h2>Item Creation</h2>

    <form class="item-form">
        <div class="form-row">
            <label>Item Code</label>
            <input type="text">
        </div>

        <div class="form-row">
            <label>Item Name</label>
            <input type="text">
        </div>

        <div class="form-row">
            <label>(Print Name)</label>
            <input type="text">
        </div>

        <div class="form-row">
            <label>Item Group</label>
            <input type="text">
        </div>

        <div class="form-row">
            <label>Type</label>
            <input type="text" value="Urad">
        </div>

        <div class="form-row">
            <label>Tax %</label>
            <input type="number">
        </div>

        <div class="form-row">
            <label>HSN</label>
            <input type="text">
        </div>

        <div class="form-row">
            <label>ED %</label>
            <input type="number">
        </div>

        <div class="form-row">
            <label>Status</label>
            <select>
                <option>Active</option>
                <option>Inactive</option>
            </select>
        </div>

        <div class="btn-row">
            <button type="submit">Save</button>
        </div>
    </form>
</div>

</body>
</html>
