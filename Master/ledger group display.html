<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ledger Group Display</title>
    <link rel="stylesheet" href="ledger group-display.css">
    <script>
        async function loadLedgerGroups() {
            try {
                const response = await fetch('http://localhost:3000/api/masters/ledgergroupmaster');
                const groups = await response.json();

                const tbody = document.querySelector('.grid-table tbody');
                tbody.innerHTML = '';

                groups.forEach((group, index) => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${index + 1}</td>
                        <td>${group.name}</td>
                        <td>${group.printname || ''}</td>
                        <td>${group.under || ''}</td>
                        <td>
                            <button onclick="editLedgerGroup(${group.id})">Edit</button>
                            <button onclick="deleteLedgerGroup(${group.id})">Delete</button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });

                document.querySelector('.footer-bar').innerHTML = `Rows: ${groups.length} <span class="footer-right">Options</span>`;
            } catch (error) {
                console.error('Error loading ledger groups:', error);
            }
        }

        async function deleteLedgerGroup(id) {
            if (!confirm('Are you sure you want to delete this ledger group?')) return;

            try {
                const response = await fetch(`http://localhost:3000/api/masters/ledgergroupmaster/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    alert('Ledger group deleted successfully');
                    loadLedgerGroups();
                } else {
                    const result = await response.json();
                    alert('Error: ' + result.message);
                }
            } catch (error) {
                alert('Error deleting ledger group: ' + error.message);
            }
        }

        function editLedgerGroup(id) {
            alert('Edit functionality would be implemented here for ledger group ID: ' + id);
        }

        document.addEventListener('DOMContentLoaded', loadLedgerGroups);
    </script>
</head>
<body>

<div class="app-container">
    <div class="entry-box">
        <h3>Ledger Group Display</h3>

        <div class="table-wrapper">
            <table class="grid-table">
                <thead>
                    <tr>
                        <th>S.No</th>
                        <th>Group Name</th>
                        <th>Print Name</th>
                        <th>Under</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Data will be loaded here -->
                </tbody>
            </table>
        </div>

        <div class="footer-bar">
            Rows: 0
            <span class="footer-right">Options</span>
        </div>
    </div>
</div>

</body>
</html>
