
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entry Creation Form</title>
    <link rel="stylesheet" href="flour mill C.css">
</head>
<body>

<div class="form-window">
    <div class="form-header">
        <span>Creation Form</span>
        <button class="close-btn">X</button>
    </div>
    
    <form class="form-body">
        <div class="form-group">
            <label>Flour Mill Name</label>
            <input type="text" name="name">
        </div>
        <div class="form-group">
            <label>(Print Name)</label>
            <input type="text" name="print_name">
        </div>
        <div class="form-group">
            <label>Cont. Person</label>
            <input type="text" name="contact_person">
        </div>
        <div class="form-group">
            <label>Address</label>
            <textarea name="address" rows="3"></textarea>
        </div>

        <div class="spacer"></div>

        <div class="form-group">
            <label>Area</label>
            <input type="text" name="area">
        </div>
        <div class="form-group">
            <label>Phone (Res)</label>
            <input type="text" name="phone_res">
        </div>
        <div class="form-group">
            <label>Phone (Off)</label>
            <input type="text" name="phone_off">
        </div>
        <div class="form-group">
            <label>Mobile</label>
            <input type="text" name="mobile">
        </div>
        <div class="form-group">
            <label>TIN No</label>
            <input type="text" name="tin_no">
        </div>
        <div class="form-group">
            <label>Status</label>
            <select name="status">
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
            </select>
        </div>

        <div class="form-footer">
            <button type="submit" class="save-btn">Save</button>
        </div>
    </form>
</div>

</body>
</html>
