<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Purchase Deduction Creation</title>
    <link rel="stylesheet" href="purchase-deduction-creation.css">
</head>
<body>

<!-- Top Title Bar -->
<div class="top-bar">
    Inventory Management System
    <span class="company">A.S. MOORTHY & CO</span>
</div>


<!-- Window Header -->
<div class="window-header">
    Purchase Deduction Creation
    <span class="close">✕</span>
</div>

<!-- Center Form -->
<div class="form-wrapper">
    <div class="form-box">

        <div class="row">
            <label>Deduction Name<br><small>(Print Name)</small></label>
            <input type="text">
        </div>

        <div class="row">
            <label>Affect the Cost of Goods</label>
            <select>
                <option>Yes</option>
                <option>No</option>
            </select>
        </div>

        <div class="row">
            <label>Debit Side Adjust with</label>
            <select>
                <option>A/c Head</option>
            </select>
        </div>

        <div class="row">
            <label>Account Head</label>
            <input type="text">
        </div>

        <div class="row">
            <label>Credit Side Adjust with</label>
            <select>
                <option>Supplier</option>
            </select>
        </div>

        <div class="row">
            <label>Deduction Type</label>
            <select>
                <option>Add</option>
                <option>Subtract</option>
            </select>
        </div>

        <div class="row">
            <label>Deduction Calc Type</label>
            <select>
                <option>Amount</option>
                <option>Percent</option>
            </select>
        </div>

        <div class="row">
            <label>Deduction Value</label>
            <input type="text">
        </div>

        <div class="row">
            <label>Status</label>
            <select>
                <option>Active</option>
                <option>Inactive</option>
            </select>
        </div>

        <div class="btn-row">
            <button>Save</button>
        </div>

    </div>
</div>

</body>
</html>
