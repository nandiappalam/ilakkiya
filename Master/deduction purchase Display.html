<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Purchase Deduction Display</title>
    <link rel="stylesheet" href="purchase-deduction-display.css">
</head>
<body>

<!-- Top Title -->
<div class="top-bar">
    Inventory Management System
    <span class="company">A.S. MOORTHY & CO</span>
</div>

<!-- Menu Bar -->
<div class="menu-bar">
    Masters | Report | Accounts | Features | Company | Quit
    <span class="date">01-04-2017 to 31-03-2026</span>
</div>

<!-- Window Header -->
<div class="window-header">
    Purchase Deduction Display
    <span class="close">✕</span>
</div>

<!-- Table Area -->
<div class="content">

    <table class="data-table">
        <thead>
            <tr>
                <th>S.No</th>
                <th>Deduction Name</th>
                <th>Affect the Cost of Goods</th>
                <th>Debit Side Adjust with</th>
                <th>Account Head</th>
                <th>Credit Side Adjust with</th>
                <th>Active</th>
            </tr>
        </thead>

        <tbody>
            <!-- Empty rows (UI only) -->
            <tr><td>&nbsp;</td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td>&nbsp;</td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td>&nbsp;</td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td>&nbsp;</td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td>&nbsp;</td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td>&nbsp;</td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td>&nbsp;</td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td>&nbsp;</td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
        </tbody>
    </table>

</div>

<!-- Footer -->
<div class="footer">
    <span>Rows: 0</span>
    <span class="right">Options</span>
</div>

</body>
</html>
