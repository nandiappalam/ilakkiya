<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sales Deduction Creation</title>
    <link rel="stylesheet" href="sales-deduction.css">
</head>
<body>

<!-- Title Bar -->
<div class="title-bar">
    Inventory Management System
    <span class="company">A.S. MOORTHY & CO</span>
</div>

<!-- Menu Bar -->
<div class="menu-bar">
    Masters | Report | Accounts | Features | Company | Quit
</div>

<!-- Page Header -->
<div class="page-header">
    Sales Deduction Creation
</div>

<!-- Main Area -->
<div class="content">

    <div class="form-box">
        <table>
            <tr>
                <td>Deduction Name<br><span>(Print Name)</span></td>
                <td><input type="text"></td>
            </tr>

            <tr>
                <td>Adjust with Sales Amount</td>
                <td>
                    <select>
                        <option>No</option>
                        <option>Yes</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td>Account Head</td>
                <td><input type="text"></td>
            </tr>

            <tr>
                <td>Deduction Type</td>
                <td>
                    <select>
                        <option>Add</option>
                        <option>Less</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td>Deduction Calc Type</td>
                <td>
                    <select>
                        <option>Amount</option>
                        <option>Percentage</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td>Deduction Value</td>
                <td><input type="text"></td>
            </tr>

            <tr>
                <td>Status</td>
                <td>
                    <select>
                        <option>Active</option>
                        <option>Inactive</option>
                    </select>
                </td>
            </tr>
        </table>
    </div>

    <div class="save-btn">
        <button>Save</button>
    </div>

</div>

</body>
</html>
