<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sales Deduction Display</title>
    <link rel="stylesheet" href="sales-deduction-display.css">
</head>
<body>

<!-- Title Bar -->
<div class="title-bar">
    Inventory Management System
    <span class="company">A.S. MOORTHY & CO</span>
</div>

<!-- Menu Bar -->
<div class="menu-bar">
    Masters | Report | Accounts | Features | Company | Quit
</div>

<!-- Page Header -->
<div class="page-header">
    Sales Deduction Display
</div>

<!-- Table Area -->
<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>S.No</th>
                <th>Deduction Name</th>
                <th>Adjust with Sales</th>
                <th>Account Head</th>
                <th>Add / Subtract</th>
                <th>Amount / Percent</th>
                <th>Deduction Amt</th>
                <th>Deduction %</th>
            </tr>
        </thead>
        <tbody>
            <!-- Empty rows for display only -->
            <tr><td colspan="8">&nbsp;</td></tr>
            <tr><td colspan="8">&nbsp;</td></tr>
            <tr><td colspan="8">&nbsp;</td></tr>
            <tr><td colspan="8">&nbsp;</td></tr>
            <tr><td colspan="8">&nbsp;</td></tr>
            <tr><td colspan="8">&nbsp;</td></tr>
            <tr><td colspan="8">&nbsp;</td></tr>
            <tr><td colspan="8">&nbsp;</td></tr>
            <tr><td colspan="8">&nbsp;</td></tr>
            <tr><td colspan="8">&nbsp;</td></tr>
        </tbody>
    </table>
</div>

<!-- Footer Buttons -->
<div class="footer">
    <button>Print</button>
    <button>Delete</button>

    <span class="rows">Row(s): 0</span>

    <button class="right">Options</button>
</div>

</body>
</html>
