<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Entry Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9ff;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 123, 255, 0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .form-section {
            padding: 30px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #495057;
            font-size: 14px;
        }

        input[type="text"],
        input[type="number"],
        input[type="date"],
        select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s, box-shadow 0.3s;
            background: #fff;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        button {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #007bff;
            color: white;
        }

        .btn-primary:hover {
            background: #0056b3;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #545b62;
        }

        .table-section {
            padding: 0 30px 30px;
            border-top: 1px solid #e9ecef;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
        }

        th {
            background: #007bff;
            color: white;
            padding: 15px 12px;
            text-align: left;
            font-weight: 600;
            font-size: 14px;
        }

        td {
            padding: 15px 12px;
            border-bottom: 1px solid #e9ecef;
            font-size: 15px;
        }

        tr:hover {
            background: #f8f9ff;
        }

        .actions {
            white-space: nowrap;
        }

        .actions button {
            padding: 6px 12px;
            font-size: 14px;
            margin-left: 5px;
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Inventory Management System</h1>
            <p>Add new stock entries below</p>
        </div>

        <div class="form-section">
            <form id="inventoryForm">
                <div class="form-grid">
                    <div>
                        <label for="itemName">Item Name</label>
                        <input type="text" id="itemName" required>
                    </div>
                    <div>
                        <label for="itemCode">Item Code</label>
                        <input type="text" id="itemCode" required>
                    </div>
                    <div>
                        <label for="category">Category</label>
                        <select id="category" required>
                            <option value="">Select Category</option>
                            <option value="Electronics">Electronics</option>
                            <option value="Clothing">Clothing</option>
                            <option value="Groceries">Groceries</option>
                            <option value="Others">Others</option>
                        </select>
                    </div>
                    <div>
                        <label for="quantity">Quantity</label>
                        <input type="number" id="quantity" min="0" required>
                    </div>
                    <div>
                        <label for="unitPrice">Unit Price</label>
                        <input type="number" id="unitPrice" min="0" step="0.01" required>
                    </div>
                    <div>
                        <label for="totalPrice">Total Price</label>
                        <input type="number" id="totalPrice" min="0" step="0.01" readonly>
                    </div>
                    <div class="full-width">
                        <label for="description">Description</label>
                        <input type="text" id="description" placeholder="Optional description">
                    </div>
                </div>
                <div class="button-group">
                    <button type="button" class="btn-secondary" onclick="resetForm()">Reset</button>
                    <button type="submit" class="btn-primary">Add Item</button>
                </div>
            </form>
        </div>

        <div class="table-section">
            <table id="inventoryTable">
                <thead>
                    <tr>
                        <th>Item Name</th>
                        <th>Code</th>
                        <th>Category</th>
                        <th>Qty</th>
                        <th>Unit Price</th>
                        <th>Total</th>
                        <th>Description</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const form = document.getElementById('inventoryForm');
        const tableBody = document.getElementById('tableBody');
        const quantityInput = document.getElementById('quantity');
        const unitPriceInput = document.getElementById('unitPrice');
        const totalPriceInput = document.getElementById('totalPrice');

        // Calculate total price
        function calculateTotal() {
            const qty = parseFloat(quantityInput.value) || 0;
            const price = parseFloat(unitPriceInput.value) || 0;
            totalPriceInput.value = (qty * price).toFixed(2);
        }

        quantityInput.addEventListener('input', calculateTotal);
        unitPriceInput.addEventListener('input', calculateTotal);

        // Reset form
        function resetForm() {
            form.reset();
            totalPriceInput.value = '';
        }

        // Add item to table
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const row = tableBody.insertRow();
            row.innerHTML = `
                <td>${document.getElementById('itemName').value}</td>
                <td>${document.getElementById('itemCode').value}</td>
                <td>${document.getElementById('category').value}</td>
                <td>${document.getElementById('quantity').value}</td>
                <td>${document.getElementById('unitPrice').value}</td>
                <td>${document.getElementById('totalPrice').value}</td>
                <td>${document.getElementById('description').value || '-'}</td>
                <td class="actions">
                    <button class="btn-primary" onclick="editRow(this)">Edit</button>
                    <button class="btn-secondary" onclick="deleteRow(this)">Delete</button>
                </td>
            `;
            
            resetForm();
        });

        // Delete row
        function deleteRow(button) {
            const row = button.closest('tr');
            row.remove();
        }

        // Edit row (placeholder - can be expanded)
        function editRow(button) {
            alert('Edit functionality can be implemented here.');
        }
    </script>
</body>
</html>
