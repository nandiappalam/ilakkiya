<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Item Creation</title>
    <link rel="stylesheet" href="item-entry.css">
	
</head>
<body>

<!-- Top Header -->
<div class="top-bar">
    Inventory Management System
    <span>A.S. MOORTHY & CO</span>
</div>

<!-- Page Title -->
<div class="page-title">Item Creation</div>

<!-- Entry Form Box -->
<div class="form-wrapper">
    <form class="entry-form">

        <div class="row">
            <label>Item Code</label><span>:</span>
            <input type="text">
        </div>

        <div class="row">
            <label>Item Name</label><span>:</span>
            <input type="text">
        </div>

        <div class="row">
            <label>Print Name</label><span>:</span>
            <input type="text">
        </div>

        <div class="row">
            <label>Item Group</label><span>:</span>
            <input type="text">
        </div>

        <div class="row">
            <label>Type</label><span>:</span>
            <select>
                <option>Urad</option>
                <option>Rice</option>
                <option>Flour</option>
            </select>
        </div>

        <div class="row">
            <label>Tax %</label><span>:</span>
            <input type="text">
        </div>

        <div class="row">
            <label>HSN</label><span>:</span>
            <input type="text">
        </div>

        <div class="row">
            <label>ED %</label><span>:</span>
            <input type="text">
        </div>

        <div class="row">
            <label>Status</label><span>:</span>
            <select>
                <option>Active</option>
                <option>Inactive</option>
            </select>
        </div>

        <div class="btn-row">
            <button type="button">Save</button>
        </div>

    </form>
</div>



</body>
</html>
