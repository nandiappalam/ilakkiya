<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sender Creation Form</title>
    <style>
        :root {
            --primary-blue: #2c5282; /* Professional Deep Blue */
            --light-blue: #ebf8ff;
            --border-color: #cbd5e0;
            --text-color: #2d3748;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f7fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .form-container {
            background: white;
            width: 500px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .form-header {
            background-color: var(--primary-blue);
            color: white;
            padding: 10px 15px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-btn {
            cursor: pointer;
            font-size: 18px;
        }

        .form-body {
            padding: 20px;
        }

        .form-group {
            display: flex;
            margin-bottom: 8px;
            align-items: center;
        }

        .form-group label {
            width: 130px;
            font-size: 13px;
            color: var(--text-color);
            font-weight: 500;
        }

        .form-group input, 
        .form-group textarea, 
        .form-group select {
            flex: 1;
            padding: 4px 8px;
            border: 1px solid var(--border-color);
            font-size: 14px;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--primary-blue);
            background-color: var(--light-blue);
        }

        .form-footer {
            padding: 10px 20px;
            text-align: right;
            border-top: 1px solid #edf2f7;
        }

        .save-btn {
            background-color: #edf2f7;
            border: 1px solid var(--border-color);
            padding: 5px 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .save-btn:hover {
            background-color: var(--primary-blue);
            color: white;
        }
    </style>
</head>
<body>

<div class="form-container">
    <div class="form-header">
        <span>Sender Creation</span>
        <span class="close-btn">×</span>
    </div>
    
    <form class="form-body">
        <div class="form-group">
            <label>Name</label>
            <input type="text" name="name">
        </div>
        <div class="form-group">
            <label>(Print Name)</label>
            <input type="text" name="print_name">
        </div>
        <div class="form-group">
            <label>Cont. Person</label>
            <input type="text" name="contact_person">
        </div>
        <div class="form-group">
            <label>Address</label>
            <textarea name="address" rows="3"></textarea>
        </div>
        <div class="form-group">
            <label>Area</label>
            <input type="text" name="area">
        </div>
        <div class="form-group">
            <label>Phone (Res)</label>
            <input type="text" name="phone_res">
        </div>
        <div class="form-group">
            <label>Phone (Off)</label>
            <input type="text" name="phone_off">
        </div>
        <div class="form-group">
            <label>Mobile</label>
            <input type="text" name="mobile">
        </div>
        <div class="form-group">
            <label>E-Mail Id</label>
            <input type="email" name="email">
        </div>
        <div class="form-group">
            <label>TIN No</label>
            <input type="text" name="tin_no">
        </div>
        <div class="form-group">
            <label>Status</label>
            <select name="status">
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
            </select>
        </div>
    </form>

    <div class="form-footer">
        <button type="button" class="save-btn">Save</button>
    </div>
</div>

</body>
</html>
