<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Weight Creation</title>
  <link rel="stylesheet" href="weight Creation.css">
</head>
<body>

<div class="app-bg">
  <div class="form-container">

    <div class="form-title">
      Weight Creation
    </div>

    <div class="form-body">
      <div class="row">
        <label>Name</label>
        <input type="text">
      </div>

      <div class="row">
        <label>(Print Name)</label>
        <input type="text">
      </div>

      <div class="row">
        <label>Weight (Kgs)</label>
        <input type="number">
      </div>

      <div class="row">
        <label>Status</label>
        <select>
          <option>Active</option>
          <option>Inactive</option>
        </select>
      </div>
    </div>

    <div class="form-footer">
      <button>Save</button>
    </div>

  </div>
</div>

</body>
</html>
