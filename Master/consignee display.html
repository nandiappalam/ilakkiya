<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Display - Inventory Management System</title>
    <style>
        :root {
            --header-blue: #304a7d;
            --table-border: #cbd5e0;
            --row-hover: #f1f5f9;
            --filter-bg: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #e2e8f0;
            margin: 0;
            padding: 20px;
        }

        .window-container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border: 1px solid #666;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* Top Title Bar */
        .window-header {
            background-color: var(--header-blue);
            color: white;
            padding: 6px 12px;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-btn {
            background: #cbd5e0;
            color: black;
            width: 18px;
            height: 18px;
            text-align: center;
            line-height: 16px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Table Styling */
        .table-wrapper {
            padding: 0;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th {
            background-color: #f1f5f9;
            color: #334155;
            font-size: 12px;
            font-weight: 600;
            text-align: left;
            padding: 8px;
            border: 1px solid var(--table-border);
            text-transform: uppercase;
        }

        /* Filter Row (Matches the empty white row in your image) */
        .filter-row td {
            padding: 0;
            border: 1px solid var(--table-border);
        }

        .filter-row input {
            width: 100%;
            border: none;
            padding: 6px 8px;
            box-sizing: border-box;
            outline: none;
            font-size: 13px;
        }

        /* Empty State Rows */
        .data-row td {
            border: 1px solid var(--table-border);
            height: 30px;
            padding: 8px;
        }

        /* Footer Status Bar */
        .table-footer {
            background-color: #f1f5f9;
            border-top: 1px solid var(--table-border);
            padding: 5px 15px;
            font-size: 12px;
            color: #475569;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .options-btn {
            background: #fff;
            border: 1px solid var(--table-border);
            padding: 2px 15px;
            cursor: pointer;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="window-container">
    <div class="window-header">
        <span>Consignee Display</span>
        <div class="close-btn">×</div>
    </div>
    
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th style="width: 50px;">Sl. No</th>
                    <th>Consignee Name</th>
                    <th>Area</th>
                    <th style="width: 150px;">Status</th>
                </tr>
                <tr class="filter-row">
                    <td></td>
                    <td><input type="text" placeholder="Filter Name..."></td>
                    <td><input type="text" placeholder="Filter Area..."></td>
                    <td><input type="text" placeholder="Filter Status..."></td>
                </tr>
            </thead>
            <tbody>
                <tr class="data-row"><td></td><td></td><td></td><td></td></tr>
                <tr class="data-row"><td></td><td></td><td></td><td></td></tr>
                <tr class="data-row"><td></td><td></td><td></td><td></td></tr>
                <tr class="data-row"><td></td><td></td><td></td><td></td></tr>
                <tr class="data-row"><td></td><td></td><td></td><td></td></tr>
                <tr class="data-row"><td></td><td></td><td></td><td></td></tr>
            </tbody>
        </table>
    </div>

    <div class="table-footer">
        <div>Rows(s) : 0</div>
        <button class="options-btn">Options</button>
    </div>
</div>

</body>
</html>
