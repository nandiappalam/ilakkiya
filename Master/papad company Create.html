<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Entry Form</title>
<link rel="stylesheet" href="papad company C.css">
</head>
<body>

<div class="window">

  <!-- Header -->
  <div class="top-bar">
    <span>Inventory Management System</span>
    <span>A.S. MOORTHY & CO</span>
  </div>

  <!-- Content -->
  <div class="content">

    <!-- Left Form -->
    <div class="left-form">
      <div class="form-row"><label>Name</label><input></div>
      <div class="form-row"><label>Print Name</label><input></div>
      <div class="form-row"><label>Contact Person</label><input></div>
      <div class="form-row"><label>Address</label><textarea></textarea></div>

      <div class="form-row"><label>Area</label><input></div>
      <div class="form-row"><label>Phone (Res)</label><input></div>
      <div class="form-row"><label>Phone (Off)</label><input></div>
      <div class="form-row"><label>Mobile</label><input></div>
      <div class="form-row"><label>Email</label><input></div>
      <div class="form-row"><label>Web</label><input></div>

      <div class="form-row"><label>Opening Balance</label><input></div>
      <div class="form-row"><label>Status</label>
        <select>
          <option>Active</option>
          <option>Inactive</option>
        </select>
      </div>
    </div>

    <!-- Right Section -->
    <div class="right-section">

      <!-- Top Grid -->
      <table>
        <thead>
          <tr>
            <th>Item Name</th>
            <th>From Date</th>
            <th>To Date</th>
            <th>Qty / Bag</th>
            <th>Rate</th>
          </tr>
        </thead>
        <tbody>
          <tr><td></td><td></td><td></td><td></td><td></td></tr>
          <tr><td></td><td></td><td></td><td></td><td></td></tr>
        </tbody>
      </table>

      <!-- Middle Grid -->
      <table class="gap">
        <thead>
          <tr>
            <th>From Date</th>
            <th>To Date</th>
            <th>Amount / Bag</th>
          </tr>
        </thead>
        <tbody>
          <tr><td></td><td></td><td></td></tr>
        </tbody>
      </table>

      <!-- Bottom Grid -->
      <table class="gap1">
        <thead>
          <tr>
            <th>S.No</th>
            <th>From Date</th>
            <th>To Date</th>
            <th>Packed Kg / Bag</th>
            <th>Wages / Bag</th>
            <th>Auto Ded / Bag</th>
          </tr>
        </thead>
        <tbody>
          <tr><td></td><td></td><td></td><td></td><td></td><td></td></tr>
          <tr><td></td><td></td><td></td><td></td><td></td><td></td></tr>
        </tbody>
      </table>

    </div>
  </div>

</div>

</body>
</html>
