<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PTrans Creation</title>
    <link rel="stylesheet" href="ptrans C.css">
</head>
<body>

<!-- Top Header -->
<div class="top-bar">
    Inventory Management System
</div>

<!-- Main Screen -->
<div class="screen">

    <div class="form-box">
        <h4>PTrans Creation</h4>

        <div class="form-row">
            <label>PTrans</label>
            <input type="text">
        </div>

        <div class="form-row">
            <label>Print Name</label>
            <input type="text">
        </div>

        <div class="form-row">
            <label>Status</label>
            <select>
                <option>Active</option>
                <option>Inactive</option>
            </select>
        </div>
    </div>

    <div class="btn-box">
        <button>Save</button>
    </div>

</div>

</body>
</html>
