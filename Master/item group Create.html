<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Item Group Creation</title>
    <link rel="stylesheet" href="item group C.css">
</head>
<body>

<div class="app-header">
    <h2>Inventory Management System</h2>
</div>

<div class="form-wrapper">
    <h3>Item Group Creation</h3>

    <div class="form-box">
        <div class="form-row">
            <label>Item Group</label>
            <span>:</span>
            <input type="text" placeholder="Enter Item Group Name">
        </div>

        <div class="form-row">
            <label>Status</label>
            <span>:</span>
            <select>
                <option>Active</option>
                <option>Inactive</option>
            </select>
        </div>

        <div class="form-actions">
            <button>Save</button>
        </div>
    </div>
</div>

</body>
</html>
