<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>City Creation</title>
    <link rel="stylesheet" href="city-create.css">
</head>
<body>

<!-- Top Title Bar -->
<div class="title-bar">
    Inventory Management System
    <span class="company">A.S. MOORTHY & CO</span>
</div>

<!-- Overlay background -->
<div class="overlay">

    <!-- Form Box -->
    <div class="form-box">
        <div class="form-title">City Creation</div>

        <div class="form-body">
            <div class="form-row">
                <label>City</label>
                <input type="text">
            </div>

            <div class="form-row">
                <label>Print Name</label>
                <input type="text">
            </div>

            <div class="form-row">
                <label>Status</label>
                <select>
                    <option>Active</option>
                    <option>Inactive</option>
                </select>
            </div>
        </div>

        <div class="form-footer">
            <button>Save</button>
        </div>
    </div>

</div>

<!-- Bottom Status Bar -->
<div class="status-bar">
    Ready
    <span class="right">27-01-2025</span>
</div>

</body>
</html>
