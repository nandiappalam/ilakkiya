<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Display Grid</title>
    <style>
        :root {
            --header-blue: #2c3e50;
            --table-border: #bdc3c7;
            --highlight-blue: #ebf5fb;
            --filter-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 20px;
            display: flex;
            justify-content: center;
        }

        .window-container {
            width: 95%;
            max-width: 1200px;
            background: white;
            border: 1px solid #7f8c8d;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        /* Title Bar mimicking the software */
        .window-title {
            background-color: var(--header-blue);
            color: white;
            padding: 5px 10px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 0 5px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Table Container */
        .grid-container {
            overflow-x: auto;
            border-bottom: 1px solid var(--table-border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        th, td {
            border: 1px solid var(--table-border);
            padding: 4px 8px;
            font-size: 13px;
            text-align: left;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Header Row */
        thead th {
            background-color: #f2f2f2;
            color: #333;
            font-weight: bold;
            position: sticky;
            top: 0;
        }

        /* Filter Row (Directly below headers as seen in screenshot) */
        .filter-row {
            background-color: var(--filter-bg);
        }

        .filter-row input {
            width: 100%;
            border: none;
            padding: 2px;
            outline: none;
            font-size: 12px;
        }

        /* Empty Data Rows */
        .data-row {
            height: 25px;
        }

        .data-row:nth-child(even) {
            background-color: #fafafa;
        }

        .data-row:hover {
            background-color: var(--highlight-blue);
        }

        /* Footer Status Bar */
        .status-bar {
            background-color: #ecf0f1;
            padding: 4px 10px;
            font-size: 12px;
            color: #2c3e50;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .action-btns {
            display: flex;
            gap: 10px;
        }

        .btn {
            background: white;
            border: 1px solid #bdc3c7;
            padding: 2px 15px;
            font-size: 12px;
            cursor: pointer;
        }

        .btn:hover {
            background: #fdfdfd;
            border-color: #3498db;
        }
    </style>
</head>
<body>

<div class="window-container">
    <div class="window-title">
        <span>Consignee Display</span>
        <button class="close-btn">X</button>
    </div>

    <div class="grid-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 50px;">Sl.No</th>
                    <th style="width: 250px;">Consignee Name</th>
                    <th style="width: 200px;">Cont. Person</th>
                    <th>Area</th>
                    <th style="width: 100px;">Status</th>
                </tr>
                <tr class="filter-row">
                    <td></td>
                    <td><input type="text" placeholder="Search Name..."></td>
                    <td><input type="text" placeholder="Search Person..."></td>
                    <td><input type="text" placeholder="Search Area..."></td>
                    <td><input type="text" placeholder="Filter Status..."></td>
                </tr>
            </thead>
            <tbody>
                <tr class="data-row"><td></td><td></td><td></td><td></td><td></td></tr>
                <tr class="data-row"><td></td><td></td><td></td><td></td><td></td></tr>
                <tr class="data-row"><td></td><td></td><td></td><td></td><td></td></tr>
                <tr class="data-row"><td></td><td></td><td></td><td></td><td></td></tr>
                <tr class="data-row"><td></td><td></td><td></td><td></td><td></td></tr>
                <tr class="data-row"><td></td><td></td><td></td><td></td><td></td></tr>
                <tr class="data-row"><td></td><td></td><td></td><td></td><td></td></tr>
                <tr class="data-row"><td></td><td></td><td></td><td></td><td></td></tr>
            </tbody>
        </table>
    </div>

    <div class="status-bar">
        <div class="action-btns">
            <button class="btn">Print</button>
            <button class="btn">Delete</button>
        </div>
        <span>Row(s) : 0</span>
        <button class="btn">Options</button>
    </div>
</div>

</body>
</html>
