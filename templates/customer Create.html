<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Creation</title>
    <link rel="stylesheet" href="customer-entry.css">
</head>
<body>

<!-- Window Header -->
<div class="window-header">
    Customer Creation
    <span class="close">✕</span>
</div>

<!-- Form Area -->
<div class="form-wrapper">
    <form class="entry-form">

        <div class="row">
            <label>Name</label>
            <input type="text">
        </div>

        <div class="row">
            <label>(Print Name)</label>
            <input type="text">
        </div>

        <div class="row">
            <label>Contact Person</label>
            <input type="text">
        </div>

        <div class="row">
            <label>Address</label>
            <textarea rows="3"></textarea>
        </div>

        <div class="row">
            <label>Phone (Res)</label>
            <input type="text">
        </div>

        <div class="row">
            <label>Phone (Off)</label>
            <input type="text">
        </div>

        <div class="row">
            <label>Mobile</label>
            <input type="text">
        </div>

        <div class="row">
            <label>Email ID</label>
            <input type="text">
        </div>

        <div class="row">
            <label>Web</label>
            <input type="text">
        </div>

        <div class="row">
            <label>TIN No</label>
            <input type="text">
        </div>

        <div class="row">
            <label>CST No</label>
            <input type="text">
        </div>

        <div class="row">
            <label>Area</label>
            <input type="text">
        </div>

        <div class="row">
            <label>Transport</label>
            <input type="text">
        </div>

        <div class="row">
            <label>Limit Days</label>
            <input type="number">
        </div>

        <div class="row">
            <label>Limit Amount</label>
            <input type="text">
        </div>

        <div class="row">
            <label>Opening Balance</label>
            <input type="text">
            <select class="drcr">
                <option>Dr</option>
                <option>Cr</option>
            </select>
        </div>

        <div class="row">
            <label>Status</label>
            <select>
                <option>Active</option>
                <option>Inactive</option>
            </select>
        </div>

        <div class="actions">
            <button type="button">Save</button>
        </div>

    </form>
</div>

</body>
</html>
