<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Flour Mill</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #E6F0FA; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { color: #005F99; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #005F99; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #004080; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Create Flour Mill</h1>
        <form action="/flour_mill_create" method="post">
            <div class="form-group">
                <label for="flourmill">Flour Mill Name</label>
                <input type="text" id="flourmill" name="flourmill" required>
            </div>
            <div class="form-group">
                <label for="print_name">Print Name</label>
                <input type="text" id="print_name" name="print_name">
            </div>
            <div class="form-group">
                <label for="contact_person">Contact Person</label>
                <input type="text" id="contact_person" name="contact_person">
            </div>
            <div class="form-group">
                <label for="address1">Address 1</label>
                <input type="text" id="address1" name="address1">
            </div>
            <div class="form-group">
                <label for="address2">Address 2</label>
                <input type="text" id="address2" name="address2">
            </div>
            <div class="form-group">
                <label for="address3">Address 3</label>
                <input type="text" id="address3" name="address3">
            </div>
            <div class="form-group">
                <label for="address4">Address 4</label>
                <input type="text" id="address4" name="address4">
            </div>
            <div class="form-group">
                <label for="gst_number">GST Number</label>
                <input type="text" id="gst_number" name="gst_number">
            </div>
            <div class="form-group">
                <label for="phone_off">Phone (Off)</label>
                <input type="text" id="phone_off" name="phone_off">
            </div>
            <div class="form-group">
                <label for="phone_res">Phone (Res)</label>
                <input type="text" id="phone_res" name="phone_res">
            </div>
            <div class="form-group">
                <label for="mobile1">Mobile 1</label>
                <input type="text" id="mobile1" name="mobile1">
            </div>
            <div class="form-group">
                <label for="mobile2">Mobile 2</label>
                <input type="text" id="mobile2" name="mobile2">
            </div>
            <div class="form-group">
                <label for="area">Area</label>
                <input type="text" id="area" name="area">
            </div>
            <div class="form-group">
                <label for="wages_kg">Wages per Kg</label>
                <input type="number" id="wages_kg" name="wages_kg" step="0.01">
            </div>
            <div class="form-group">
                <label for="opening_balance">Opening Balance (Dr)</label>
                <input type="number" id="opening_balance" name="opening_balance" step="0.01">
            </div>
            <button type="submit">Save Flour Mill</button>
        </form>
    </div>
</body>
</html>
