<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Item</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #E6F0FA; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { color: #005F99; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #005F99; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #004080; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Create Item</h1>
        <form action="/item_create" method="post">
            <div class="form-group">
                <label for="item_code">Item Code</label>
                <input type="text" id="item_code" name="item_code" required>
            </div>
            <div class="form-group">
                <label for="item_name">Item Name</label>
                <input type="text" id="item_name" name="item_name" required>
            </div>
            <div class="form-group">
                <label for="print_name">Print Name</label>
                <input type="text" id="print_name" name="print_name">
            </div>
            <div class="form-group">
                <label for="item_group">Item Group</label>
                <select id="item_group" name="item_group">
                    <option value="Raw">Raw</option>
                    <option value="Finished">Finished</option>
                    <option value="Packing">Packing</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label for="tax">Tax (%)</label>
                <input type="number" id="tax" name="tax" step="0.01">
            </div>
            <div class="form-group">
                <label for="hsn_code">HSN Code</label>
                <input type="text" id="hsn_code" name="hsn_code">
            </div>
            <button type="submit">Save Item</button>
        </form>
    </div>
</body>
</html>
