<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flour Out Return Creation</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f3f0ff; /* light violet tone (your software style) */
    }

    .container {
        width: 98%;
        margin: 10px auto;
        background: white;
        padding: 15px;
        border-radius: 8px;
        border: 1px solid #c8c2ff;
        box-shadow: 0 0 5px #ddd;
    }

    h2 {
        text-align: center;
        background: #d9d2ff;
        padding: 10px;
        border-radius: 5px;
        margin-top: 0;
        border: 1px solid #b7afff;
    }

    /* Top Section */
    .top-section {
        display: flex;
        justify-content: space-between;
        gap: 15px;
        flex-wrap: wrap;
        background: #ede9ff;
        padding: 10px;
        border-radius: 5px;
        border: 1px solid #bcb6ff;
    }

    .field-group {
        display: flex;
        flex-direction: column;
        width: 22%;
    }

    .field-group label {
        font-weight: bold;
        margin-bottom: 2px;
        font-size: 14px;
    }

    .field-group input {
        padding: 6px;
        border: 1px solid #a89aff;
        border-radius: 4px;
        background: #ffffff;
    }

    /* Table */
    table {
        width: 100%;
        margin-top: 15px;
        border-collapse: collapse;
        background: white;
        border: 1px solid #c1baff;
    }

    th {
        background: #dcd6ff;
        padding: 8px;
        border: 1px solid #b6afff;
        font-size: 14px;
    }

    td {
        border: 1px solid #d0c9ff;
        padding: 5px;
    }

    td input {
        width: 100%;
        border: none;
        background: transparent;
        font-size: 14px;
    }

    .add-btn, .save-btn {
        margin-top: 10px;
        padding: 10px 20px;
        background: #786bff;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 15px;
    }
    .delete-row-btn {
        background: #ff6666;
        color: white;
        border: none;
        padding: 5px 10px;
        border-radius: 5px;
        cursor: pointer;
    }

    .add-btn:hover { background: #5a4fff; }
    .save-btn:hover { background: #5244e6; }

    /* Bottom totals */
    .bottom-totals {
        margin-top: 15px;
        display: flex;
        justify-content: flex-end;
        gap: 20px;
        padding: 10px;
        background: #f1ecff;
        border-radius: 5px;
        border: 1px solid #c0b6ff;
    }

    .total-box {
        font-size: 16px;
        font-weight: bold;
    }
</style>
</head>
<body>

<div class="container">

    <h2>FLOUR OUT RETURN - CREATION</h2>

    <!-- TOP SECTION -->
    <div class="top-section">
        <div class="field-group">
            <label>S.No</label>
            <input id="sno" type="text" value="1" readonly>
        </div>

        <div class="field-group">
            <label>Date</label>
            <input id="date" type="datetime-local">
        </div>

        <div class="field-group">
            <label>Tax Type</label>
            <input id="taxType" type="text" placeholder="Cash / Credit">
        </div>

        <div class="field-group">
            <label>Remarks</label>
            <input id="remarks" type="text" placeholder="Enter remarks">
        </div>
    </div>

    <!-- TABLE -->
    <table id="itemTable">
        <thead>
            <tr>
                <th>No</th>
                <th>Item Name</th>
                <th>Weight</th>
                <th>Qty</th>
                <th>Total Wt</th>
                <th>Papad Kg</th>
                <th>Cost</th>
                <th>Wages/Bag</th>
                <th>Wages</th>
                <th>Delete</th>
            </tr>
        </thead>

        <tbody id="tableBody">
        </tbody>
    </table>

    <button class="add-btn" onclick="addRow()">+ Add Row</button>

    <!-- TOTAL SUMMARY -->
    <div class="bottom-totals">
        <div class="total-box">Total Qty: <span id="totalQty">0</span></div>
        <div class="total-box">Total Weight: <span id="totalWeight">0</span></div>
        <div class="total-box">Total Wages: <span id="totalWages">0</span></div>
    </div>

    <button class="save-btn">Save</button>

</div>


<script>
window.onload = () => {
    document.getElementById("date").value = new Date().toISOString().slice(0, 16);
    addRow();
};

function addRow() {
    let tableBody = document.getElementById("tableBody");
    let rowCount = tableBody.rows.length + 1;

    let row = document.createElement("tr");

    row.innerHTML = `
        <td>${rowCount}</td>
        <td><input type="text"></td>
        <td><input type="number" step="0.01" oninput="calculateRow(this)"></td>
        <td><input type="number" step="1" oninput="calculateRow(this)"></td>
        <td><input type="text" readonly></td>
        <td><input type="number" step="0.01"></td>
        <td><input type="number" step="0.01"></td>
        <td><input type="number" step="0.01" oninput="calculateRow(this)"></td>
        <td><input type="text" readonly></td>
        <td><button class="delete-row-btn" onclick="deleteRow(this)">X</button></td>
    `;

    tableBody.appendChild(row);
}

function deleteRow(btn) {
    btn.parentElement.parentElement.remove();
    updateTotals();
}

function calculateRow(el) {
    let row = el.parentElement.parentElement;
    let weight = parseFloat(row.cells[2].children[0].value) || 0;
    let qty = parseFloat(row.cells[3].children[0].value) || 0;
    let wagesBag = parseFloat(row.cells[7].children[0].value) || 0;

    let totalWeight = weight * qty;
    let wages = qty * wagesBag;

    row.cells[4].children[0].value = totalWeight.toFixed(2);
    row.cells[8].children[0].value = wages.toFixed(2);

    updateTotals();
}

function updateTotals() {
    let tableBody = document.getElementById("tableBody");
    let totalQty = 0, totalWeight = 0, totalWages = 0;

    for (let row of tableBody.rows) {
        totalQty += parseFloat(row.cells[3].children[0].value) || 0;
        totalWeight += parseFloat(row.cells[4].children[0].value) || 0;
        totalWages += parseFloat(row.cells[8].children[0].value) || 0;
    }

    document.getElementById("totalQty").innerText = totalQty;
    document.getElementById("totalWeight").innerText = totalWeight.toFixed(2);
    document.getElementById("totalWages").innerText = totalWages.toFixed(2);
}
</script>

</body>
</html>
