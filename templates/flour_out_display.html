<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flour Out Display</title>

<style>
body {
    margin: 0;
    font-family: Calibri, Arial, sans-serif;
    background: #e9f2fb;
}

/* Top Software Header */
.top-header {
    background: linear-gradient(to right, #1e5799, #2989d8);
    color: white;
    padding: 6px 10px;
    font-size: 14px;
}

.top-header span {
    float: right;
}

/* Menu Bar */
.menu-bar {
    background: #dbe9f6;
    border-bottom: 1px solid #999;
    padding: 5px 10px;
    font-size: 14px;
}

.menu-bar span {
    margin-right: 15px;
    cursor: pointer;
}

/* Page Title */
.page-title {
    background: #3c78d8;
    color: white;
    padding: 6px 10px;
    font-weight: bold;
    border-bottom: 2px solid #2a5cab;
}

/* Filter Bar */
.filter-bar {
    background: #f5f9ff;
    padding: 6px 10px;
    border-bottom: 1px solid #bbb;
    display: flex;
    align-items: center;
}

.filter-bar label {
    font-weight: bold;
    margin-right: 5px;
}

.filter-bar input {
    padding: 4px;
    margin-right: 15px;
    border: 1px solid #888;
}

/* Table Area */
.table-container {
    height: 420px;
    overflow: auto;
    background: #eef6ff;
    border-top: 1px solid #999;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}

th {
    background: #d6e6ff;
    border: 1px solid #999;
    padding: 6px;
    font-size: 13px;
}

td {
    border: 1px solid #ccc;
    padding: 5px;
    font-size: 13px;
}

/* Bottom Buttons */
.bottom-bar {
    background: #dbe9f6;
    padding: 6px;
    border-top: 1px solid #999;
    display: flex;
    justify-content: space-between;
}

.bottom-bar button {
    padding: 5px 20px;
    border: 1px solid #555;
    background: #f0f6ff;
    cursor: pointer;
}

.bottom-bar button:hover {
    background: #d0e2ff;
}

/* Status Bar */
.status-bar {
    background: #3c78d8;
    color: white;
    font-size: 12px;
    padding: 4px 10px;
    display: flex;
    justify-content: space-between;
}
</style>

</head>
<body>

<!-- PAGE TITLE -->
<div class="page-title">Flour Out Display</div>

<!-- FILTER -->
<div class="filter-bar">
    <label>Date :</label>
    <input type="date">
    <label>To</label>
    <input type="date">
</div>

<!-- TABLE -->
<div class="table-container">
<table>
    <thead>
        <tr>
            <th>S.No</th>
            <th>Date</th>
            <th>Papad Company</th>
            <th>Item Name</th>
            <th>Lot No</th>
            <th>Weight</th>
            <th>Qty</th>
            <th>Total Wt</th>
            <th>Papad Kg</th>
        </tr>
    </thead>
    <tbody>
        <!-- Data Rows -->
        <!-- Example -->
        <!--
        <tr>
            <td>1</td>
            <td>21-12-2025</td>
            <td>ABC Mill</td>
            <td>Rice Flour</td>
            <td>LOT-001</td>
            <td>50</td>
            <td>10</td>
            <td>500</td>
            <td>500</td>
        </tr>
        -->
    </tbody>
</table>
</div>

<!-- BOTTOM BUTTONS -->
<div class="bottom-bar">
    <div>
        <button>Print</button>
        <button>Cancel</button>
    </div>
    <div>
        <button>Options</button>
    </div>
</div>

<!-- STATUS BAR -->
<div class="status-bar">
    <span>Rows : 0</span>
    <span>User : PADMAVU</span>
    <span>21 Dec 2025</span>
</div>

</body>
</html>
