<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Inventory Management</h1>
    </header>
    <main>
        <section class="inventory-list">
            <h2>Current Stock</h2>
            <table>
                <thead>
                    <tr>
                        <th>Item ID</th>
                        <th>Product Name</th>
                        <th>Category</th>
                        <th>Quantity</th>
                        <th>Price</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>001</td>
                        <td>Laptop</td>
                        <td>Electronics</td>
                        <td>15</td>
                        <td>$1200</td>
                    </tr>
                    <tr>
                        <td>002</td>
                        <td>Desk Chair</td>
                        <td>Furniture</td>
                        <td>25</td>
                        <td>$150</td>
                    </tr>
                    <!-- Add more inventory items here -->
                </tbody>
            </table>
        </section>
        <section class="add-item">
            <h2>Add New Item (Static Placeholder)</h2>
            <form>
                <label for="itemId">Item ID:</label>
                <input type="text" id="itemId" name="itemId"><br>
                <label for="productName">Product Name:</label>
                <input type="text" id="productName" name="productName"><br>
                <input type="submit" value="Add Item (No Functionality)">
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2025 BVC Inventory Management</p>
    </footer>
</body>
</html>
