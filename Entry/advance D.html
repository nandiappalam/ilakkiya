<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Advance Display</title>

<style>
body{
    margin:0;
    font-family:Tahoma, Arial;
    font-size:17px;
    background:#f2f6ff;
}

/* HEADER */
.header{
    background:#1f4fb2;
    color:white;
    padding:6px 10px;
    display:flex;
    justify-content:space-between;
}

/* MENU BAR */
.menu{
    background:#ffffff;
    border-bottom:1px solid #9db7e8;
    padding:6px 10px;
}
.menu span{
    margin-right:18px;
    color:#1f4fb2;
}

/* TITLE BAR */
.title{
    background:#3b6fd8;
    color:white;
    padding:6px 10px;
    display:flex;
    justify-content:space-between;
    font-weight:bold;
	margin-top:10px;
}
/* ===== FILTER BAR ===== */
.filter-bar{
    padding:0px 10px;
    display:flex;
    justify-content:flex-end;
    gap:6px;
    border-bottom:1px solid #8aa4d8;
    height:25px;
}

.filter-bar label{
    font-size:15px;
    margin-top:3px;
}

.filter-bar input{
    height:20px;
    border:1px solid #8aa4d8;
    width:150px;
}
/* MAIN AREA */
.container{
    background:#eaf1ff;
    min-height:420px;
    padding:8px;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th{
    background:#dce8ff;
    border:1px solid #9db7e8;
    padding:5px;
    font-weight:normal;
}

td{
    border:1px solid #9db7e8;
    height:26px;
}

/* FOOTER BUTTONS */
.footer{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:6px 8px;
    background:#ffffff;
    border-top:1px solid #9db7e8;
	margin-top:350px;
}

.btn{
    padding:4px 14px;
    background:#3b6fd8;
    color:white;
    border:1px solid #1f4fb2;
    cursor:pointer;
    margin-right:6px;
}

.right-info{
    font-size:12px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div>Inventory Management System</div>
    <div>A.S. MOORTHY & CO</div>
</div>

<!-- TITLE -->
<div class="title">
    <div>Advance Display</div>
    <div>
        <div><!-- FILTER -->
<div class="filter-bar">
    <label>Date :</label>
    <input type="Date">
    <input type="Date">
</div></div>
    </div>
</div>

<!-- TABLE AREA -->
<div class="container">
    <table>
        <tr>
            <th>Adv No</th>
            <th>Date</th>
            <th>Papad Company</th>
            <th>Amount</th>
            <th>Type</th>
            <th>Pay Mode</th>
            <th>Remarks</th>
        </tr>

        <!-- EMPTY ROW -->
        <tr>
            <td>&nbsp;</td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
        </tr>
    </table>
</div>

<!-- FOOTER -->
<div class="footer">
    <div>
        <button class="btn">Print</button>
        <button class="btn">Edit</button>
        <button class="btn">Update</button>
        <button class="btn">Cancel</button>
    </div>

    <div class="right-info">
        Rows : 0
    </div>
</div>

</body>
</html>
