<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sales Order Creation</title>
<link rel="stylesheet" href="sales-order C.css">
</head>
<body>

<!-- TOP HEADER -->
<div class="top-header">
  <div>A.S. MOORTHY & CO</div>
</div>

<div class="system-title">Inventory Management System</div>

<!-- SCREEN NAME -->
<div class="screen-name">Sales Order Creation</div>

<!-- FORM HEADER -->
<div class="form-header">
  <div class="block">
    <div><label>Bill No</label><input value=""></div>
    <div><label>Date</label><input value=""></div>
    <div><label>Pay Type</label><input value=""></div>
  </div>

  <div class="block">
    <div><label>Tax Type</label><input value=""></div>
    <div><label>Type</label><input value=""></div>
    <div><label>Remarks</label><input></div>
  </div>

  <div class="block wide">
    <div><label>Customer</label><input></div>
    <div><label>Address</label><input></div>
  </div>
</div>

<!-- ITEM GRID -->
<div class="grid-area">
<table>
  <thead>
    <tr>
      <th>Item Name</th>
      <th>Qty</th>
      <th>Box</th>
      <th>Rate</th>
      <th>Disc %</th>
      <th>Tax %</th>
      <th>Amount</th>
    </tr>
  </thead>
  <tbody>
    <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
    <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
    <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
    <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
    <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
  </tbody>
</table>
</div>

<!-- BOTTOM SECTION -->
<div class="bottom-section">

  <div class="summary">
    <div><label>Tax %</label><input></div>
    <div><label>Amount</label><input></div>
    <div><label>Bill Amt</label><input></div>
    <div><label>Tax Amt</label><input></div>
    <div><label>Tot Amt</label><input></div>
  </div>

  <div class="deduction">
    <div><label>Deduction</label><input></div>
    <div><label>Percent</label><input></div>
    <div><label>Amount</label><input></div>
    <div><label>Remarks</label><input></div>
  </div>

  <div class="final-box">
    <div class="final-amount">0.00</div>
    <button class="save-btn">Save</button>
  </div>

</div>

</body>
</html>
