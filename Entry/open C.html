<!DOCTYPE html>
<html>
<head>

<title>Opening Creation</title>

<style>
body{
    margin:0;
    font-family:Tahoma, Arial;
    font-size:17px;
    background:#eef3ff;
}

/* HEADER */
.header{
    background:#1f4fb2;
    color:white;
    padding:6px 10px;
    display:flex;
    justify-content:space-between;
}

/* MENU */
.menu{
    background:white;
    border-bottom:1px solid #9db7e8;
    padding:6px 10px;
}
.menu span{
    margin-right:16px;
    color:#1f4fb2;
}

/* TITLE */
.title{
    background:#3b6fd8;
    color:white;
    padding:6px 10px;
    font-weight:bold;
}

/* MAIN */
.container{
    background:#eaf1ff;
    padding:10px;
    min-height:430px;
}

/* FORM ROWS */
.form-row{
    display:flex;
    align-items:center;
    margin-bottom:8px;
}
.form-row label{
    width:120px;
}
.form-row input, select{
    height:22px;
    border:1px solid #9db7e8;
    padding:2px 6px;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
    background:white;
    margin-top:8px;
}
th{
    background:#dce8ff;
    border:1px solid #9db7e8;
    padding:5px;
    font-weight:normal;
}
td{
    border:1px solid #9db7e8;
    height:36px;
}

/* FOOTER */
.footer{
    background:white;
    border-top:1px solid #9db7e8;
    padding:6px 10px;
    display:flex;
    justify-content:flex-end;
	margin-top:300px;
}

.btn{
    background:#3b6fd8;
    color:white;
    border:1px solid #1f4fb2;
    padding:4px 18px;
    cursor:pointer;
}
</style>
</head>
