<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quotation Creation</title>
<link rel="stylesheet" href="Quotation C.css">
</head>
<body>

<!-- TOP FRAME -->
<div class="top-frame">
  <div class="top-bar">
    <span>A.S. MOORTHY & CO</span>
  </div>

  <div class="title-bar">Inventory Management System</div>

  <div class="screen-title">Quotation Creation</div>
</div>

<!-- MIDDLE FRAME -->
<div class="middle-frame">

  <!-- FORM HEADER -->
  <div class="form-header">
    <div class="col">
      <label>Bill No</label><input value="">
      <label>Date</label><input value="">
      <label>Pay Type</label><input value="">
    </div>

    <div class="col">
      <label>Tax Type</label><input value="">
      <label>Type</label><input value="">
      <label>Remarks</label><input>
    </div>

    <div class="col wide">
      <label>Customer</label><input>
      <label>Address</label><input>
    </div>
  </div>

  <!-- ITEM GRID -->
  <table class="grid">
    <thead>
      <tr>
        <th>Item Name</th>
        <th>Qty</th>
        <th>Box</th>
        <th>Rate</th>
        <th>Disc %</th>
        <th>Tax %</th>
        <th>Amount</th>
      </tr>
    </thead>
    <tbody>
      <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
      <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
      <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
      <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
    </tbody>
  </table>

</div>

<!-- BOTTOM FRAME -->
<div class="bottom-frame">

  <!-- LEFT -->
  <div class="bottom-left">
    <label>Tax %</label><input>
    <label>Amount</label><input>
    <label>Bill Amt</label><input>
    <label>Tax Amt</label><input>
    <label>Total Amt</label><input>
  </div>

  <!-- RIGHT -->
  <div class="bottom-right">
    <label>Deduction</label><input>
    <label>Percent</label><input>
    <label>Amount</label><input>
    <label>Remarks</label><input>

    <div class="final">
      <div class="total">0.00</div>
      <button>Save</button>
    </div>
  </div>

</div>

</body>
</html>
