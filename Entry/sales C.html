<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sales Creation</title>
<link rel="stylesheet" href="sales C.css">
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <div class="right">A.S. MOORTHY & CO</div>
</div>

<!-- SYSTEM TITLE -->
<div class="system-title">Inventory Management System</div>


<!-- SCREEN TITLE -->
<div class="screen-title">Sales Creation</div>

<!-- ENTRY FORM -->
<div class="entry-form">
  <div class="col">
    <div class="row"><label>Bill No</label><input value=""></div>
    <div class="row"><label>Date</label><input value=""></div>
    <div class="row"><label>Pay Type</label><input value=""></div>
    <div class="row"><label>Tax Type</label><input value=""></div>
    <div class="row"><label>Type</label><input value=""></div>
  </div>

  <div class="col">
    <div class="row"><label>Lorry No</label><input></div>
    <div class="row"><label>P.O No</label><input></div>
    <div class="row"><label>Driver</label><input></div>
    <div class="row"><label>Pur. Trans</label><input></div>
    <div class="row"><label>Remarks</label><input></div>
  </div>

  <div class="col wide">
    <div class="row"><label>Customer</label><input></div>
    <div class="row"><label>Address</label><input></div>
    <div class="row"><label>Sender</label><input></div>
    <div class="row"><label>Consigned To</label><input></div>
	<div class="row"><label>Godown from</label><input></div>
  </div>
</div>

<!-- ITEM GRID -->
<div class="grid-box">
<table>
  <thead>
    <tr>
      <th>Item Name</th>
      <th>Lot No</th>
      <th>Qty</th>
      <th>Box</th>
      <th>Rate</th>
      <th>Disc %</th>
      <th>Tax %</th>
      <th>Amount</th>
    </tr>
  </thead>
  <tbody>
    <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
    <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
    <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
    <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
  </tbody>
</table>
</div>

<!-- BOTTOM TOTALS -->
<div class="bottom-area">
  <div class="totals">
    <div><label>Bill Amt</label><input></div>
    <div><label>Tax Amt</label><input></div>
    <div><label>Total Amt</label><input></div>
  </div>

  <div class="deduction">
    <div><label>Deduction</label><input></div>
    <div><label>Remarks</label><input></div>
  </div>

  <div class="final">
    <div class="amount"></div>

    <button class="save">Save</button>
  </div>
</div>

</body>
</html>
