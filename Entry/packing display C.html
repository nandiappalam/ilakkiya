<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Packing Display</title>

<style>
body{
    margin:0;
    font-family:Tahoma, Arial;
    font-size:17px;
    background:#eaf2ff;
}

/* HEADER */
.header{
    background:#2458a6;
    color:#fff;
    padding:6px 10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* MENU */
.menu{
    background:#f4f7ff;
    padding:6px 10px;
    border-bottom:1px solid #8aa4d8;
}
.menu span{
    margin-right:18px;
    cursor:pointer;
}

/* MAIN WINDOW */
.window{
    margin:8px;
    border:1px solid #8aa4d8;
    background:#ffffff;
}

/* TITLE BAR */
.title{
    background:#3f6fc0;
    color:white;
    padding:6px 10px;
    font-weight:bold;
    display:flex;
    justify-content:space-between;
}

/* TABLE AREA */
.table-area{
    background:#f9fbff;
    min-height:380px;
    padding:0;
}

table{
    width:70%;
    border-collapse:collapse;
	margin-top:50px;
}

th{
    background:#3f6fc0;
    color:white;
    border:1px solid #8aa4d8;
    height:24px;
}

td{
    border:1px solid #8aa4d8;
    height:22px;
    background:white;
}

/* FOOTER */
.footer{
    border-top:1px solid #8aa4d8;
    background:#f4f7ff;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:6px 10px;
	margin-top:320px;
}

.buttons button{
    margin-left:6px;
    padding:4px 18px;
    background:#3f6fc0;
    color:white;
    border:1px solid #2458a6;
    cursor:pointer;
}
/* ===== FILTER BAR ===== */
.filter-bar{
    padding:0px 10px;
    display:flex;
    justify-content:flex-end;
    gap:6px;
    border-bottom:1px solid #8aa4d8;
    height:25px;
}

.filter-bar label{
    font-size:15px;
    margin-top:3px;
}

.filter-bar input{
    height:20px;
    border:1px solid #8aa4d8;
    width:150px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div>Inventory Management System</div>
    <div>A.S. MOORTHY & CO</div>
</div>

<div class="window">

<!-- TITLE -->
<div class="title">
    <div>Packing Display</div>
    <div><!-- FILTER -->
<div class="filter-bar">
    <label>Date :</label>
    <input type="Date">
    <input type="Date">
</div></div>
</div>

<!-- TABLE -->
<div class="table-area">
<table>
    <tr>
        <th style="width:30px">S.No</th>
        <th style="width:40px">Date</th>
        <th style="width:100px">Item Name</th>
        <th style="width:40px">Lot No</th>
        <th style="width:60px">Kg</th>
    </tr>
    <!-- EMPTY ROWS -->
    <tr><td></td><td></td><td></td><td></td><td></td></tr>
    <tr><td></td><td></td><td></td><td></td><td></td></tr>
    <tr><td></td><td></td><td></td><td></td><td></td></tr>
</table>
</div>

<!-- FOOTER -->
<div class="footer">
    <div>Rows : 0</div>
    <div class="buttons">
        <button>Print</button>
        <button>Edit</button>
        <button>Update</button>
        <button>Cancel</button>
    </div>
</div>

</div>

</body>
</html>
