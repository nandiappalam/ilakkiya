<!DOCTYPE html>

<body>

  <span>Inventory Management System</span>
  <span class="right">A.S. MOORTHY & CO</span>
</div>

<div class="menu-bar">
  <span>Entry</span>

  <span>Report</span>
  <span>Accounts</span>
  <span>Features</span>
  <span>Company</span>

      <tr><td colspan="6">&nbsp;</td></tr>
      <tr><td colspan="6">&nbsp;</td></tr>
      <tr><td colspan="6">&nbsp;</td></tr>
      <tr><td colspan="6">&nbsp;</td></tr>

</div>

<!-- Bottom Buttons -->
<div class="footer-bar">
  <div class="left">
    <button onclick="window.print()">Print</button>
    <button>Edit</button>
    <button>Update</button>
  </div>
  <div class="right">
    Row(s): 0
  </div>
