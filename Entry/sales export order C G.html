<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Export Sales Order Creation</title>
    <link rel="stylesheet" href="sales export order C G.css">
</head>
<body>

<div class="window-frame">
    <div class="header-bar">
        <span>Export Sales Order Creation</span>
        <button class="win-btn">×</button>
    </div>

    <div class="form-body">
        <div class="header-fields">
            <div class="column">
                <div class="field"><label>Bill No.</label><input type="text" value=""></div>
                <div class="field"><label>Date</label><input type="text" value=""></div>
                <div class="field"><label>Order No/Dt</label><input type="text"></div>
                <div class="field"><label>Dis Port</label><input type="text"></div>
                <div class="field"><label>Dest. Country</label><input type="text"></div>
            </div>
            <div class="column">
                <div class="field"><label>Exporter</label><input type="text"></div>
                <div class="field"><label>Consignee</label><input type="text"></div>
                <div class="field"><label>Buyer (Other)</label><input type="text"></div>
                <div class="field"><label>Vessel/Flt No</label><input type="text"></div>
                <div class="field"><label>Gross Wt</label><input type="text"></div>
            </div>
            <div class="column">
                <div class="field"><label>Place Of Rcpt</label><input type="text"></div>
                <div class="field"><label>Loading Port</label><input type="text"></div>
                <div class="field"><label>Delivery Terms</label><input type="text"></div>
                <div class="field"><label>Advance</label><input type="text"></div>
                <div class="field"><label>Sign</label><input type="text"></div>
            </div>
        </div>

        <div class="grid-section">
            <table class="item-table">
                <thead>
                    <tr>
                        <th>Container No</th>
                        <th>Kind of Package</th>
                        <th>Description</th>
                        <th>Qty</th>
                        <th>USD Rate</th>
                        <th>Conv Rate</th>
                        <th>USD Amt</th>
                        <th>INR Amt</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><input type="text"></td>
                        <td><input type="text"></td>
                        <td><input type="text"></td>
                        <td><input type="text"></td>
                        <td><input type="text"></td>
                        <td><input type="text"></td>
                        <td><input type="text"></td>
                        <td><input type="text"></td>
                    </tr>
                    </tbody>
            </table>
        </div>

        <div class="summary-bar">
            <span>Row(s) : 0</span>
            <span class="total-display">0.00</span>
        </div>
    </div>

    <div class="footer-bar">
        <button class="save-button">💾 Save</button>
    </div>
</div>

</body>
</html>
