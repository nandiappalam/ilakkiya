<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Stock Adjust Display</title>

<style>
body{
    margin:0;
    font-family:Tahoma, Arial;
    background:#eaf2ff;
}

/* ===== TOP BAR ===== */
.top-bar{
    background:#2f5fa7;
    color:#fff;
    padding:6px 10px;
    font-size:17px;
    display:flex;
    justify-content:space-between;
}

/* ===== WINDOW ===== */
.window{
    margin:8px;
    border:1px solid #8aa4d8;
    background:#ffffff;
}

/* ===== TITLE ===== */
.form-title{
    background:#3f6fc0;
    color:white;
    padding:6px 10px;
    font-weight:bold;
    font-size:15px;
}

/* ===== FILTER BAR ===== */
.filter-bar{
    padding:12px 10px;
    display:flex;
    justify-content:flex-end;
    gap:6px;
    border-bottom:1px solid #8aa4d8;
    background:#f4f7ff;
	height:25px;
}

.filter-bar label{
    font-size:15px;
    margin-top:3px;
}

.filter-bar input{
    height:20px;
    border:1px solid #8aa4d8;
    width:150px;
}

/* ===== GRID ===== */
.grid{
    height:750px;
    background:#ffffff;
}

table{
    width:100%;
    border-collapse:collapse;
    font-size:15px;
}

th{
    background:#3f6fc0;
    color:white;
    border:1px solid #8aa4d8;
    height:24px;
    text-align:center;
}

td{
    border:1px solid #8aa4d8;
    height:22px;
}

/* ===== BOTTOM BAR ===== */
.bottom-bar{
    background:#f4f7ff;
    border-top:1px solid #8aa4d8;
    padding:6px 10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.btn-group button{
    padding:4px 16px;
    margin-right:6px;
    border:1px solid #2f5fa7;
    background:#3f6fc0;
    color:white;
    cursor:pointer;
    font-size:15px;
}

.status{
    font-size:12px;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">
    <div>Inventory Management System</div>
    <div>A.S.MOORTHY & CO</div>
</div>


<!-- WINDOW -->
<div class="window">

<div class="form-title">Stock Adjust Display</div>

<!-- FILTER -->
<div class="filter-bar">
    <label>Date :</label>
    <input type="Date">
    <input type="Date">
</div>

<!-- GRID -->
<div class="grid">
<table>
<thead>
<tr>
    <th>S.No</th>
    <th>Date</th>
    <th>Remarks</th>
    <th>Item Name</th>
    <th>Lot No</th>
    <th>Weight</th>
    <th>Type</th>
    <th>Qty</th>
    <th>Tot Wt</th>
</tr>
</thead>
<tbody>
<!-- EMPTY ROWS (NO DATA) -->
<tr><td colspan="9">&nbsp;</td></tr>
<tr><td colspan="9">&nbsp;</td></tr>
<tr><td colspan="9">&nbsp;</td></tr>
<tr><td colspan="9">&nbsp;</td></tr>
</tbody>
</table>
</div>

<!-- BOTTOM BAR -->
<div class="bottom-bar">
    <div class="btn-group">
        <button>Print</button>
        <button>Edit</button>
        <button>Update</button>
        <button>Cancel</button>
    </div>
    <div class="status">Rows : 0</div>
</div>

</div>

</body>
</html>
